name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run lint
        run: python -m ruff check .

      - name: Run unit tests
        run: python -m pytest

      - name: Run ingestion smoke
        run: python scripts/ingest.py --raw-dir data/raw --processed-dir data/processed

      - name: Run retrieval evaluation
        run: python scripts/evaluate.py --golden data/golden_questions.csv --processed-dir data/processed
